name: Code Quality

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

defaults:
  run:
    shell: sh

permissions:
  contents: read

jobs:
  shell-quality:
    name: Shell and checksum quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install shell tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt ripgrep dnsmasq

      - name: Run code quality checks
        run: tools/code-quality.sh

      - name: Explain formatting remediation
        if: failure()
        run: |
          {
            printf '%s\n' '## Code quality remediation'
            printf '%s\n' ''
            printf '%s\n' 'If the failure above is from `shfmt`, run `tools/code-quality.sh --fix` locally and commit the formatting changes, or dispatch the `Create shfmt formatting PR` workflow against this branch.'
          } >> "$GITHUB_STEP_SUMMARY"
