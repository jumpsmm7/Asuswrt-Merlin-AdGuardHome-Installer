name: Create script improvement PR

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch to improve; defaults to the branch that started the workflow
        required: false
        default: ""
  push:
    branches:
      - master
      - 'dev/**'
    paths:
      - installer
      - AdGuardHome.sh
      - S99AdGuardHome
      - rc.func.AdGuardHome
      - '**/*.sh'
      - tools/list-shell-scripts.sh
      - tools/update-md5.sh
      - .github/workflows/shfmt-fix-pr.yml

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: script-improvements-${{ github.ref }}
  cancel-in-progress: false

jobs:
  improve-scripts:
    name: Create script improvement PR
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch'

    steps:
      - name: Resolve target branch
        id: branch
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.target_branch }}" ]; then
            target_branch="${{ inputs.target_branch }}"
          else
            target_branch="${GITHUB_REF_NAME}"
          fi

          case "${target_branch}" in
            ""|*..*|/*|*' '*|*'~'*|*'^'*|*':'*|*'?'*|*'['*|*'\\'*)
              echo "Invalid target branch: ${target_branch}" >&2
              exit 1
              ;;
          esac

          safe_branch="$(printf '%s' "${target_branch}" | tr '/@' '--' | tr -cd 'A-Za-z0-9._-')"
          echo "target=${target_branch}" >> "${GITHUB_OUTPUT}"
          echo "safe=${safe_branch}" >> "${GITHUB_OUTPUT}"

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch.outputs.target }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Go for shfmt
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false

      - name: Install shfmt
        run: |
          go install mvdan.cc/sh/v3/cmd/shfmt@v3.10.0
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"

      - name: Apply safe automatic script improvements
        run: |
          set -eu

          scripts_file="$(mktemp)"
          errors_file="$(mktemp)"
          trap 'rm -f "${scripts_file}" "${errors_file}"' EXIT HUP INT TERM

          sh tools/list-shell-scripts.sh > "${scripts_file}"

          if [ ! -s "${scripts_file}" ]; then
            echo "No shell scripts found."
            exit 0
          fi

          while IFS= read -r script; do
            echo "normalize shell text: ${script}"
            python3 - "${script}" <<'PY'
import pathlib
import sys

path = pathlib.Path(sys.argv[1])
data = path.read_bytes()

# Keep edits conservative: normalize CRLF, strip trailing horizontal
# whitespace, and ensure exactly one final newline.
text = data.decode('utf-8')
text = text.replace('\r\n', '\n').replace('\r', '\n')
lines = [line.rstrip(' \t') for line in text.split('\n')]
text = '\n'.join(lines).rstrip('\n') + '\n'
new = text.encode('utf-8')

if new != data:
    path.write_bytes(new)
PY
          done < "${scripts_file}"

          while IFS= read -r script; do
            echo "shfmt -w -ln mksh: ${script}"
            if ! shfmt -w -ln mksh -i 0 -ci "${script}" 2>> "${errors_file}"; then
              echo "shfmt could not parse ${script}; skipped automatic formatting for this file." >> "${errors_file}"
            fi
          done < "${scripts_file}"

          if [ -s "${errors_file}" ]; then
            echo "shfmt parser warnings:"
            cat "${errors_file}"
          fi

      - name: Refresh md5sum files after script improvements
        run: |
          sh tools/update-md5.sh installer AdGuardHome.sh S99AdGuardHome rc.func.AdGuardHome

      - name: Show changed files
        run: |
          if git diff --quiet; then
            echo "No automatic script improvements were needed."
          else
            echo "Automatic script improvements changed these files:"
            git diff --name-only
          fi

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ${{ steps.branch.outputs.target }}
          branch: automation/script-improvements-${{ steps.branch.outputs.safe }}
          delete-branch: true
          commit-message: "style: apply automatic script improvements"
          title: "style: apply automatic script improvements"
          body: |
            ## Summary

            Applies safe automatic script improvements:

            - `shfmt -ln mksh -i 0 -ci` formatting where scripts parse cleanly
            - CRLF to LF normalization
            - trailing whitespace cleanup
            - final newline normalization
            - refreshed `.md5sum` files after script changes

            Files that shfmt cannot parse are skipped and reported in the workflow log.
