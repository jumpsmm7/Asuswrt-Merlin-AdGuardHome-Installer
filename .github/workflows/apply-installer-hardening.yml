name: Apply installer hardening

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch to update with generated installer hardening changes
        required: true
        default: dev/installer-code-hardening-squash
      reset_target_from_master:
        description: Recreate/reset target branch from current master before applying changes
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      hardening_phase:
        description: Installer hardening phase to apply
        required: true
        default: phase1
        type: choice
        options:
          - phase1
          - phase2
          - phase3
          - phase4
          - phase5
          - final
          - improve
          - improve2

permissions:
  contents: write

jobs:
  apply-installer-hardening:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare target branch
        env:
          TARGET_BRANCH: ${{ inputs.target_branch }}
          RESET_TARGET_FROM_MASTER: ${{ inputs.reset_target_from_master }}
        run: |
          set -eu

          case "${TARGET_BRANCH}" in
            *'*'*|*'?'*|*'['*|*']'*|'')
              echo "Invalid target branch: ${TARGET_BRANCH}" >&2
              exit 1
              ;;
          esac

          git fetch origin master

          if [ "${RESET_TARGET_FROM_MASTER}" = "true" ]; then
            git checkout -B "${TARGET_BRANCH}" origin/master
          elif git ls-remote --exit-code --heads origin "${TARGET_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "refs/heads/${TARGET_BRANCH}:refs/remotes/origin/${TARGET_BRANCH}"
            git checkout -B "${TARGET_BRANCH}" "origin/${TARGET_BRANCH}"
          else
            git checkout -B "${TARGET_BRANCH}" origin/master
          fi

      - name: Apply installer hardening
        env:
          HARDENING_PHASE: ${{ inputs.hardening_phase }}
        run: |
          set -eu

          case "${HARDENING_PHASE}" in
            phase1)
              python3 tools/apply-installer-hardening-ci.py
              ;;
            phase2)
              python3 tools/apply-installer-hardening-phase2.py
              ;;
            phase3)
              python3 tools/apply-installer-hardening-phase3.py
              ;;
            phase4)
              python3 tools/apply-installer-hardening-phase4.py
              ;;
            phase5)
              python3 tools/apply-installer-hardening-phase5.py
              ;;
            final)
              python3 tools/apply-installer-hardening-final.py
              ;;
            improve)
              python3 tools/apply-installer-improvements.py
              ;;
            improve2)
              python3 tools/apply-installer-improvements-2.py
              ;;
            *)
              echo "Unknown hardening phase: ${HARDENING_PHASE}" >&2
              exit 1
              ;;
          esac

      - name: Ensure installer.md5sum exists
        run: |
          if [ -f installer ] && [ ! -f installer.md5sum ]; then
            md5sum installer | awk '{print $1}' > installer.md5sum
          fi
          if [ -f installer.md5 ]; then
            rm -f installer.md5
          fi

      - name: Update changed MD5SUM files
        run: |
          sh tools/update-changed-md5.sh --all

      - name: Validate MD5SUM files
        run: |
          sh tools/check-md5.sh

      - name: Validate POSIX shell syntax
        run: |
          sh -n installer
          if [ -d tools ]; then
            find tools -type f -name '*.sh' -print -exec sh -n {} \;
          fi

      - name: Validate router compatibility
        run: |
          sh tools/check-router-compat.sh installer

      - name: ShellCheck advisory
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck installer || true
          if [ -d tools ]; then
            find tools -type f -name '*.sh' | sort | while read -r script; do
              shellcheck "${script}" || true
            done
          fi

      - name: Commit generated changes
        env:
          TARGET_BRANCH: ${{ inputs.target_branch }}
          HARDENING_PHASE: ${{ inputs.hardening_phase }}
        run: |
          set -eu

          if git diff --quiet; then
            echo "No generated changes to commit."
            git push --force-with-lease origin HEAD:"${TARGET_BRANCH}"
            exit 0
          fi

          git status --short
          git add installer installer.md5sum tools docs .github
          git rm -f installer.md5 2>/dev/null || true
          git commit -m "installer: apply ${HARDENING_PHASE} hardening changes and update checksums"
          git push --force-with-lease origin HEAD:"${TARGET_BRANCH}"
