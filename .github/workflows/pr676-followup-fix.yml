name: PR 676 follow-up fixer

on:
  pull_request:
    branches:
      - dev
    paths:
      - .github/workflows/pr676-followup-fix.yml
  push:
    branches:
      - v2.6.1
    paths:
      - .github/workflows/pr676-followup-fix.yml

permissions:
  contents: write

concurrency:
  group: pr-676-follow-up-fixer
  cancel-in-progress: false

jobs:
  apply-fixes:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out v2.6.1
        uses: actions/checkout@v5
        with:
          ref: v2.6.1
          fetch-depth: 0

      - name: Install shell tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y busybox shellcheck shfmt

      - name: Apply recovery-path and regression fixes
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path: Path, old: str, new: str) -> None:
              text = path.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one replacement target, found {count}")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")

          installer = Path("installer")
          old_startup = (
              'PREVIOUS_ADGUARD_INSTALL_MODE="$(conf_value ADGUARD_INSTALL_MODE 2>/dev/null)"\n'
              'adguard_install_mode_detect || {\n'
              '\tsleep 3s\n'
              '\texit 1\n'
              '}\n'
          )
          new_startup = (
              'PREVIOUS_ADGUARD_INSTALL_MODE="$(conf_value ADGUARD_INSTALL_MODE 2>/dev/null)"\n'
              'case "${PREVIOUS_ADGUARD_INSTALL_MODE}" in\n'
              '\twan | lan) ADGUARD_INSTALL_MODE="${PREVIOUS_ADGUARD_INSTALL_MODE}" ;;\n'
              '\t*) ADGUARD_INSTALL_MODE="wan" ;;\n'
              'esac\n'
              'case "${1:-}" in\n'
              '\tdoctor | status | uninstall | migrate-runtime-defaults) ;;\n'
              '\t*)\n'
              '\t\tcase "${2:-}" in\n'
              '\t\t\t2 | uninstall | d | D | doctor | status | m | M | migrate-runtime-defaults) ;;\n'
              '\t\t\t*)\n'
              '\t\t\t\tadguard_install_mode_detect || {\n'
              '\t\t\t\t\tsleep 3s\n'
              '\t\t\t\t\texit 1\n'
              '\t\t\t\t}\n'
              '\t\t\t\t;;\n'
              '\t\tesac\n'
              '\t\t;;\n'
              'esac\n'
          )
          replace_once(installer, old_startup, new_startup)

          detection_test = Path("tests/installer-install-mode-detection.sh")
          detection_text = detection_test.read_text(encoding="utf-8")
          anchor = (
              'grep -q \'PREVIOUS_ADGUARD_INSTALL_MODE="$(conf_value ADGUARD_INSTALL_MODE 2>/dev/null)"\' "${SCRIPT_PATH}" ||\n'
              '\tfail \'installer must preserve the saved install mode before detection\'\n'
          )
          regression = r'''STARTUP_DETECTION_FILE="${TMP_ROOT}/startup-detection"
sed -n '/^PREVIOUS_ADGUARD_INSTALL_MODE=/,/^if \[ "${ADGUARD_INSTALL_MODE}" = "wan" \]/p' "${SCRIPT_PATH}" >"${STARTUP_DETECTION_FILE}" ||
	fail 'could not extract startup install-mode detection guard'
[ -s "${STARTUP_DETECTION_FILE}" ] || fail 'startup install-mode detection guard extraction was empty'
grep -q '^case "${PREVIOUS_ADGUARD_INSTALL_MODE}" in$' "${STARTUP_DETECTION_FILE}" ||
	fail 'recovery paths must initialize install mode from the saved configuration'
grep -q 'wan | lan) ADGUARD_INSTALL_MODE="${PREVIOUS_ADGUARD_INSTALL_MODE}" ;;' "${STARTUP_DETECTION_FILE}" ||
	fail 'recovery paths must preserve a valid saved install mode'
grep -q '\*) ADGUARD_INSTALL_MODE="wan" ;;' "${STARTUP_DETECTION_FILE}" ||
	fail 'recovery paths must fall back safely when the saved install mode is invalid'
grep -q '^case "${1:-}" in$' "${STARTUP_DETECTION_FILE}" ||
	fail 'startup install-mode detection must be guarded by the requested command'
grep -q 'doctor | status | uninstall | migrate-runtime-defaults)' "${STARTUP_DETECTION_FILE}" ||
	fail 'direct recovery commands must bypass startup install-mode detection'
grep -q '2 | uninstall | d | D | doctor | status | m | M | migrate-runtime-defaults)' "${STARTUP_DETECTION_FILE}" ||
	fail 'menu recovery actions must bypass startup install-mode detection'
direct_recovery_line="$(grep -n 'doctor | status | uninstall | migrate-runtime-defaults)' "${STARTUP_DETECTION_FILE}" | cut -d: -f1)"
menu_recovery_line="$(grep -n '2 | uninstall | d | D | doctor | status | m | M | migrate-runtime-defaults)' "${STARTUP_DETECTION_FILE}" | cut -d: -f1)"
detection_line="$(grep -n 'adguard_install_mode_detect || {' "${STARTUP_DETECTION_FILE}" | cut -d: -f1)"
[ -n "${direct_recovery_line}" ] && [ -n "${menu_recovery_line}" ] && [ -n "${detection_line}" ] &&
	[ "${direct_recovery_line}" -lt "${detection_line}" ] && [ "${menu_recovery_line}" -lt "${detection_line}" ] ||
	fail 'recovery command guards must run before startup install-mode detection'
grep -q 'sleep 3s' "${STARTUP_DETECTION_FILE}" && grep -q 'exit 1' "${STARTUP_DETECTION_FILE}" ||
	fail 'non-recovery commands must retain install-mode detection failure handling'
'''
          if "STARTUP_DETECTION_FILE=" in detection_text:
              raise SystemExit(f"{detection_test}: recovery-path regression already exists")
          if detection_text.count(anchor) != 1:
              raise SystemExit(f"{detection_test}: expected one insertion anchor")
          detection_test.write_text(detection_text.replace(anchor, anchor + regression, 1), encoding="utf-8")

          handoff_test = Path("tests/rc-required-handoff-fallback.sh")
          old_comment = (
              '# The runtime helper is authoritative even when PRECMD forgets to export the\n'
              '# agh_dns_handoff_required indicates whether AdGuardHome requires DNS handoff preparation before starting.\n'
          )
          new_comment = (
              '# The runtime helper remains authoritative when PRECMD does not export the\n'
              '# required DNS handoff decision.\n'
          )
          replace_once(handoff_test, old_comment, new_comment)

          Path(".github/workflows/pr676-followup-fix.yml").unlink()
          PY

          shfmt -w -ln mksh -i 0 -ci installer tests/installer-install-mode-detection.sh tests/rc-required-handoff-fallback.sh
          sh tools/update-checksums.sh

      - name: Validate focused regressions
        run: |
          sh -n installer tests/installer-install-mode-detection.sh tests/rc-required-handoff-fallback.sh
          sh tests/installer-install-mode-detection.sh
          sh tests/rc-required-handoff-fallback.sh
          sh tools/check-md5.sh
          sh tools/check-sha256.sh
          git diff --check

      - name: Run full code-quality pathway
        run: sh tools/code-quality.sh

      - name: Commit fixes to the pull-request branch
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add installer installer.md5sum installer.sha256sum \
            tests/installer-install-mode-detection.sh \
            tests/rc-required-handoff-fallback.sh \
            .github/workflows/pr676-followup-fix.yml
          git commit -m "Allow recovery commands to bypass mode detection"
          git push origin HEAD:v2.6.1
