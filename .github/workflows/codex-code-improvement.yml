name: Codex Code Improvement Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      prompt:
        description: Extra instructions for Codex
        required: false
        type: string

defaults:
  run:
    shell: sh

permissions:
  contents: read

concurrency:
  group: codex-code-improvement-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  codex-review:
    name: Review code with Codex
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    permissions:
      contents: read
    env:
      HAS_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY != '' }}
    outputs:
      final_message: ${{ steps.codex.outputs.final-message }}
      should_run: ${{ steps.changed-files.outputs.should_run }}
    steps:
      - name: Check out pull request merge
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0

      - name: Check out selected ref
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch pull request refs
        if: github.event_name == 'pull_request'
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Decide whether Codex should review
        id: changed-files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -eu
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            printf 'should_run=true\n' >>"$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '(^|/)(installer|AdGuardHome\.sh|S99AdGuardHome|rc\.func\.AdGuardHome|.*\.sh|.*\.md5sum|\.shellcheckrc|tools/|\.github/workflows/|\.github/prompts/)'; then
            printf 'should_run=true\n' >>"$GITHUB_OUTPUT"
          else
            printf 'should_run=false\n' >>"$GITHUB_OUTPUT"
            printf 'No shell, checksum, tool, or workflow changes detected; skipping Codex review.\n'
          fi

      - name: Install shell tooling
        if: steps.changed-files.outputs.should_run == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - name: Run local code quality checks
        id: local-quality
        if: steps.changed-files.outputs.should_run == 'true'
        run: |
          set +e
          tools/code-quality.sh > codex-code-quality.log 2>&1
          status=$?
          cat codex-code-quality.log
          printf 'exit_code=%s\n' "$status" >>"$GITHUB_OUTPUT"
          exit 0

      - name: Compose Codex prompt
        if: steps.changed-files.outputs.should_run == 'true' && env.HAS_OPENAI_API_KEY == 'true'
        env:
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || 'manual' }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || 'manual' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          EXTRA_INSTRUCTIONS: ${{ github.event.inputs.prompt || 'None' }}
        run: |
          cat .github/prompts/codex-code-improvement.md > .github/prompts/codex-runtime.md
          {
            printf '\nRuntime context:\n'
            printf '%s\n' "- Repository: $REPOSITORY"
            printf '%s\n' "- Pull request: #$PR_NUMBER"
            printf '%s\n' "- Base SHA: $BASE_SHA"
            printf '%s\n' "- Head SHA: $HEAD_SHA"
            printf '%s\n' "- Extra instructions: $EXTRA_INSTRUCTIONS"
            printf '%s\n' "- Local code quality exit code: ${{ steps.local-quality.outputs.exit_code || 'not-run' }}"
            printf '\nLocal code quality output:\n'
            if [ -f codex-code-quality.log ]; then
              cat codex-code-quality.log
            else
              printf '%s\n' 'No local code quality log was produced.'
            fi
          } >> .github/prompts/codex-runtime.md

      - name: Skip Codex when API key is unavailable
        if: steps.changed-files.outputs.should_run == 'true' && env.HAS_OPENAI_API_KEY != 'true'
        run: |
          printf '%s\n' 'OPENAI_API_KEY is not configured for this workflow run; skipping Codex review.'

      - name: Run Codex code improvement review
        if: steps.changed-files.outputs.should_run == 'true' && env.HAS_OPENAI_API_KEY == 'true'
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/prompts/codex-runtime.md
          sandbox: read-only
          safety-strategy: drop-sudo
          working-directory: ${{ github.workspace }}

  post-codex-feedback:
    name: Post Codex feedback
    runs-on: ubuntu-latest
    needs: codex-review
    if: github.event_name == 'pull_request' && needs.codex-review.outputs.should_run == 'true' && needs.codex-review.outputs.final_message != ''
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Comment on pull request
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex-review.outputs.final_message }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
