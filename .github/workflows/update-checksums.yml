name: Update checksum files

on:
  push:
    branches:
      - master
      - 'dev/**'
    paths:
      - installer
      - AdGuardHome.sh
      - S99AdGuardHome
      - rc.func.AdGuardHome
      - 'armv5/*.tar.gz'
      - 'armv5/*.tar.gz.md5sum'
      - 'armv5/*.tar.gz.sha256sum'
      - 'armv7/*.tar.gz'
      - 'armv7/*.tar.gz.md5sum'
      - 'armv7/*.tar.gz.sha256sum'
      - 'armv8/*.tar.gz'
      - 'armv8/*.tar.gz.md5sum'
      - 'armv8/*.tar.gz.sha256sum'
      - tools/update-checksums.sh
      - .github/workflows/update-checksums.yml
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch to update; defaults to the branch that started the workflow
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: update-checksums-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-checksums:
    name: Update checksum files
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch'

    steps:
      - name: Resolve target branch
        id: branch
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${INPUT_TARGET_BRANCH}" ]; then
            target_branch="${INPUT_TARGET_BRANCH}"
          else
            target_branch="${GITHUB_REF_NAME}"
          fi

          case "${target_branch}" in
            ""|*..*|/*|*' '*|*'~'*|*'^'*|*':'*|*'?'*|*'['*|*'\\'*)
              echo "Invalid target branch: ${target_branch}" >&2
              exit 1
              ;;
          esac

          echo "target=${target_branch}" >> "${GITHUB_OUTPUT}"

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch.outputs.target }}
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update checksum files
        shell: bash
        run: |
          set -euo pipefail

          checksum_targets=(installer AdGuardHome.sh S99AdGuardHome rc.func.AdGuardHome)
          while IFS= read -r archive; do
            checksum_targets+=("${archive}")
          done < <(find armv5 armv7 armv8 -maxdepth 1 -type f -name '*.tar.gz' | sort)

          sh tools/update-checksums.sh "${checksum_targets[@]}"

      - name: Commit checksum updates
        shell: bash
        run: |
          set -euo pipefail

          checksum_files=(installer.md5sum installer.sha256sum AdGuardHome.sh.md5sum AdGuardHome.sh.sha256sum S99AdGuardHome.md5sum S99AdGuardHome.sha256sum rc.func.AdGuardHome.md5sum rc.func.AdGuardHome.sha256sum)
          while IFS= read -r archive; do
            checksum_files+=("${archive}.md5sum" "${archive}.sha256sum")
          done < <(find armv5 armv7 armv8 -maxdepth 1 -type f -name '*.tar.gz' | sort)

          if [ -z "$(git status --porcelain -- "${checksum_files[@]}")" ]; then
            echo "No checksum updates needed."
            exit 0
          fi

          git status --short -- "${checksum_files[@]}"
          git add "${checksum_files[@]}"
          git commit -m "chore: update checksum files"
          git push origin HEAD:${{ steps.branch.outputs.target }}
