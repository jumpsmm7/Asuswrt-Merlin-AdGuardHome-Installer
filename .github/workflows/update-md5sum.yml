name: Update md5sum files

on:
  push:
    branches:
      - master
      - 'dev/**'
    paths:
      - installer
      - AdGuardHome.sh
      - S99AdGuardHome
      - rc.func.AdGuardHome
      - 'armv5/*.tar.gz'
      - 'armv5/*.tar.gz.md5sum'
      - 'armv7/*.tar.gz'
      - 'armv7/*.tar.gz.md5sum'
      - 'armv8/*.tar.gz'
      - 'armv8/*.tar.gz.md5sum'
      - tools/update-md5.sh
      - .github/workflows/update-md5sum.yml
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch to update; defaults to the branch that started the workflow
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: update-md5sum-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-md5sum:
    name: Update md5sum files
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch'

    steps:
      - name: Resolve target branch
        id: branch
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.target_branch }}" ]; then
            target_branch="${{ inputs.target_branch }}"
          else
            target_branch="${GITHUB_REF_NAME}"
          fi

          case "${target_branch}" in
            ""|*..*|/*|*' '*|*'~'*|*'^'*|*':'*|*'?'*|*'['*|*'\\'*)
              echo "Invalid target branch: ${target_branch}" >&2
              exit 1
              ;;
          esac

          echo "target=${target_branch}" >> "${GITHUB_OUTPUT}"

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch.outputs.target }}
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update md5sum files
        shell: bash
        run: |
          set -euo pipefail

          md5_targets=(installer AdGuardHome.sh S99AdGuardHome rc.func.AdGuardHome)
          while IFS= read -r archive; do
            md5_targets+=("${archive}")
          done < <(find armv5 armv7 armv8 -maxdepth 1 -type f -name '*.tar.gz' | sort)

          sh tools/update-md5.sh "${md5_targets[@]}"

      - name: Commit md5sum updates
        shell: bash
        run: |
          set -euo pipefail

          md5_files=(installer.md5sum AdGuardHome.sh.md5sum S99AdGuardHome.md5sum rc.func.AdGuardHome.md5sum)
          while IFS= read -r archive; do
            md5_files+=("${archive}.md5sum")
          done < <(find armv5 armv7 armv8 -maxdepth 1 -type f -name '*.tar.gz' | sort)

          if [ -z "$(git status --porcelain -- "${md5_files[@]}")" ]; then
            echo "No md5sum updates needed."
            exit 0
          fi

          git status --short -- "${md5_files[@]}"
          git add "${md5_files[@]}"
          git commit -m "chore: update md5sum files"
          git push origin HEAD:${{ steps.branch.outputs.target }}
