name: Shell validation

on:
  pull_request:
  push:
    branches:
      - master
      - 'dev/**'

permissions:
  contents: read

jobs:
  syntax:
    name: POSIX shell syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check installer syntax
        run: sh -n installer

      - name: Check helper script syntax
        run: |
          if [ -d tools ]; then
            find tools -type f -name '*.sh' -print -exec sh -n {} \;
          fi

      - name: Check router compatibility
        run: |
          sh tools/check-router-compat.sh installer

      - name: Check md5sum files
        run: |
          if find . -type f -name '*.md5sum' ! -path './.git/*' | grep -q .; then
            sh tools/check-md5.sh
          else
            echo "No .md5sum files present; checksum validation skipped."
          fi

  shellcheck:
    name: ShellCheck advisory
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck advisory report
        run: |
          status=0

          echo "Running ShellCheck advisory checks. Warnings are reported below but do not fail this job."

          if [ -f installer ]; then
            shellcheck --severity=warning installer || status=1
          fi

          if [ -d tools ]; then
            find tools -type f -name '*.sh' | sort | while read -r script; do
              echo "ShellCheck: ${script}"
              shellcheck --severity=warning "${script}" || true
            done
          fi

          if [ "${status}" -ne 0 ]; then
            echo "ShellCheck found advisory warnings. See log output above."
          else
            echo "ShellCheck found no advisory warnings."
          fi

          exit 0
