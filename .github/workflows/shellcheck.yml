name: Shell validation

on:
  pull_request:
  push:
    branches:
      - master
      - 'dev/**'

permissions:
  contents: read

jobs:
  syntax:
    name: POSIX shell syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check installer syntax
        run: sh -n installer

      - name: Check helper script syntax
        run: |
          if [ -d tools ]; then
            find tools -type f -name '*.sh' -print -exec sh -n {} \;
          fi

  shellcheck:
    name: ShellCheck advisory
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck as advisory only
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
          check_together: 'yes'
          ignore_paths: '.git'
