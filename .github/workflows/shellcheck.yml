name: ShellCheck

on:
  pull_request:
  push:
    branches:
      - master
      - 'dev/**'

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
          check_together: 'yes'
          ignore_paths: '.git'
